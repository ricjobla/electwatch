services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-electwatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-electwatch}
      POSTGRES_DB: ${POSTGRES_DB:-electwatch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electwatch -d electwatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-electwatch}:${POSTGRES_PASSWORD:-electwatch}@db:5432/${POSTGRES_DB:-electwatch}
      SCRAPER_SCHEDULER_ENABLED: "true"
      ELECTWATCH_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
